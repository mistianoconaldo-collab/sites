<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaw Inc. | Official Artist Site</title>
    
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <style>
        :root {
            --accent: #00d4ff; 
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            overflow-x: hidden;
        }

        /* Hero Header */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            text-align: center;
        }

        h1 { font-size: 5rem; margin: 0; letter-spacing: -2px; text-transform: uppercase; }
        .tagline { font-size: 1.2rem; color: var(--accent); letter-spacing: 3px; }

        /* Content Wrapper */
        .container { max-width: 1000px; margin: auto; padding: 40px 20px; }

        section { margin-bottom: 80px; }
        h2 { border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 5px; margin-bottom: 30px; }

        /* Music Player */
        .music-grid { background: var(--card-bg); padding: 20px; border-radius: 10px; }

        /* Tour Table */
        .tour-table { width: 100%; border-collapse: collapse; }
        .tour-table tr { border-bottom: 1px solid #222; }
        .tour-table td { padding: 20px 10px; }
        .date { color: var(--accent); font-weight: bold; width: 100px; }
        .venue { font-size: 1.1rem; }
        .btn-tickets { 
            background: transparent; 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 8px 20px; 
            text-decoration: none; 
            border-radius: 4px;
            float: right;
        }
        .btn-tickets:hover { background: var(--accent); color: #000; }

        footer { text-align: center; padding: 60px; border-top: 1px solid #222; opacity: 0.7; }
    </style>
</head>
<body>

    <header>
        <p class="tagline">GAW INC. PRESENTS</p>
        <h1>GAW INC.</h1>
    </header>

    <div class="container">
        
        <section id="music">
            <h2>LATEST SOUNDS</h2>
            <div class="music-grid">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/4cOdK2wGvWyR9p7yhnid0B" width="100%" height="152" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>
        </section>

        <section id="tour">
            <h2>TOUR DATES</h2>
            <table class="tour-table">
                <tr>
                    <td class="date">MAY 20</td>
                    <td class="venue">The Grand Ballroom <br><small>Chicago, IL</small></td>
                    <td><a href="#" class="btn-tickets">TICKETS</a></td>
                </tr>
                <tr>
                    <td class="date">JUN 05</td>
                    <td class="venue">Electric Forest <br><small>Rothbury, MI</small></td>
                    <td><a href="#" class="btn-tickets">TICKETS</a></td>
                </tr>
            </table>
        </section>

    </div>

    <footer>
        <p>© 2026 GAW INC. | ALL RIGHTS RESERVED</p>
        <p>FOLLOW: INSTAGRAM • YOUTUBE • SPOTIFY</p>
    </footer>

</body>
</html>
